/* ══════════════════════════════════════════════════════
   MOBILE-FIRST RESPONSIVE STYLES
   ▸ 기준: 360px~430px (갤럭시·아이폰 전 기종)
   ▸ 터치 최소 영역: 44×44px (Apple HIG / Google MD)
   ▸ safe-area: 노치·홈 바 환경 대응
   ══════════════════════════════════════════════════════ */

/* ── 1. 전역 베이스: 모바일·PC 공통 ── */
html { touch-action: manipulation; }
body { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
button, input, select, textarea {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
/* 숫자 입력 스피너 제거 */
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type=number] { -moz-appearance: textfield; }

/* ── 2. 768px 이하: 전체 모바일 레이아웃 ── */
@media (max-width: 768px) {

  /* 앱 컨테이너 */
  .app {
    max-width: 100%;
    overflow-x: hidden;
    padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 8px);
  }

  /* ── 헤더 ── */
  .header {
    padding: 10px 14px 0;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 6px rgba(0,0,0,.07);
  }
  .header h1 { font-size: 15px; letter-spacing: -.3px; }

  /* ── 탭 버튼: 44px 터치 영역 ── */
  .tab-btn {
    font-size: 11px;
    padding: 8px 10px;
    min-height: 44px;
    border-radius: 8px;
  }

  /* ── 2단 → 1단 세로 레이아웃 ── */
  .two-col { flex-direction: column; }
  .col-cal { width: 100%; }
  .col-side {
    width: 100%;
    border-left: none;
    border-top: 1px solid var(--bd);
    min-height: unset;
  }
  .side-list { max-height: 260px; }

  /* ── 달력 ── */
  .cal-nav { padding: 10px 14px 6px; }
  .cal-nav span { font-size: 14px; font-weight: 700; }
  .cal-nav button {
    font-size: 22px;
    padding: 6px 12px;
    min-height: 44px;
    min-width: 44px;
  }
  .cal-wrap { padding: 0 4px 8px; }

  /* 달력 셀: 터치 44px 목표 */
  .cc {
    min-height: 46px;
    padding: 3px 0;
    border-radius: 6px;
  }
  .dn {
    font-size: 12px;
    width: 24px; height: 24px;
  }
  .dot { width: 5px; height: 5px; }
  .ca { font-size: 7.5px; }
  .cb { gap: 2px; }
  .dl span { font-size: 11px; padding: 5px 0; }

  /* ── 요약 카드 (scards): 2×2 그리드 ── */
  .scards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    padding: 8px 10px 0;
  }
  .sc { padding: 9px 10px; border-radius: 10px; }
  .sc .lb { font-size: 10px; }
  .sc .vl { font-size: 13px; font-weight: 700; margin-top: 3px; }

  /* ── 날짜 상세 패널 ── */
  .dpanel { margin: 8px 8px 0; border-radius: 10px; }
  .dh { padding: 10px 14px; }
  .dh span { font-size: 13px; }
  .dh button {
    font-size: 12px;
    padding: 7px 12px;
    min-height: 36px;
    min-width: 52px;
  }
  .db { padding: 4px 12px 8px; }

  /* 내역 행 ── */
  .ir { gap: 8px; padding: 9px 0; }
  .it { font-size: 13px; }
  .is { font-size: 11px; }
  .iamt { font-size: 13px; }
  .ra-btn {
    font-size: 16px;
    padding: 6px 6px;
    min-height: 36px;
    min-width: 32px;
  }

  /* ── 예산·저축·카드 패널 ── */
  .bpanel, .savpanel, .perf-panel {
    margin: 8px 8px 0;
    border-radius: 10px;
  }
  .bpanel-hd, .savpanel-hd, .perf-hd { padding: 10px 14px; }
  .bpanel-hd button, .savpanel-hd button, .perf-hd button {
    font-size: 12px;
    padding: 7px 12px;
    min-height: 34px;
  }
  .bpanel-body, .savpanel-body, .perf-body { padding: 10px 14px; }
  .prog-label span { font-size: 12px; }
  .prog-label small { font-size: 11px; }
  .prog-bar { height: 8px; }

  /* ── 모달: 바텀 시트 ── */
  .modal {
    padding: 20px 18px;
    padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    border-radius: 18px 18px 0 0;
    max-height: 92vh;
  }
  .mt { font-size: 16px; margin-bottom: 16px; }
  .mt button { font-size: 24px; min-width: 44px; min-height: 44px; }

  /* ── 모달 입력 요소: 터치 최적화 ── */
  label { font-size: 13px; margin-top: 14px; margin-bottom: 5px; }
  input[type=text],
  input[type=date],
  input[type=number],
  select,
  textarea {
    font-size: 15px;        /* iOS 자동 줌 방지: 최소 16px 권장, 15px도 안전 */
    padding: 11px 12px;
    border-radius: 10px;
    min-height: 44px;
  }

  /* 버튼 */
  .bprim { padding: 14px; font-size: 15px; border-radius: 10px; margin-top: 16px; }
  .bsec  { padding: 12px; font-size: 14px; border-radius: 10px; }
  .bdang { padding: 12px; font-size: 14px; border-radius: 10px; }

  /* 토글 버튼 */
  .tbtn {
    padding: 11px 6px;
    font-size: 13px;
    min-height: 44px;
    border-radius: 10px;
  }

  /* 반복 선택 버튼 */
  .rb { padding: 10px 2px; font-size: 11px; min-height: 40px; }

function matchRep(sc,date){
  if(!sc.rep||sc.rep==='none') return sc.date===date;
  if(date<sc.date) return false;
  if(sc.repEnd&&date>sc.repEnd) return false;
  if(sc.rep==='daily') return true;
  if(sc.rep==='weekly'){
    const base=new Date(sc.date+'T00:00:00');
    const tgt=new Date(date+'T00:00:00');
    const diff=Math.round((tgt-base)/86400000);
    return diff%7===0;
  }
  if(sc.rep==='monthly'){
    const baseParts=sc.date.split('-').map(Number);
    const tgtParts=date.split('-').map(Number);
    const baseDay=baseParts[2];
    const tgtDay=tgtParts[2];
    const baseYM=baseParts[0]*12+baseParts[1];
    const tgtYM=tgtParts[0]*12+tgtParts[1];
    return tgtYM>=baseYM && tgtDay===baseDay;
  }
  if(sc.rep==='yearly'){
    const baseParts=sc.date.split('-').map(Number);
    const tgtParts=date.split('-').map(Number);
    return tgtParts[0]>=baseParts[0] && tgtParts[1]===baseParts[1] && tgtParts[2]===baseParts[2];
  }
  return false;
}
function getScheds(date){return ST.d.s.filter(s=>matchRep(s,date));}
function matchRepLed(le,date){
  if(!le.rep||le.rep==='none') return le.date===date;

  if(le.repEnd&&date>le.repEnd) return false;
  const baseParts=le.date.split('-').map(Number);
  const tgtParts=date.split('-').map(Number);
  if(le.rep==='daily') return true;
  if(le.rep==='weekly'){
    const base=new Date(le.date+'T00:00:00'),tgt=new Date(date+'T00:00:00');
    return Math.round((tgt-base)/86400000)%7===0;
  }
  if(le.rep==='monthly'){
    const baseDay2=baseParts[2],tgtDay2=tgtParts[2];
    const baseYM2=baseParts[0]*12+baseParts[1];
    const tgtYM2=tgtParts[0]*12+tgtParts[1];
    return tgtYM2>=baseYM2 && tgtDay2===baseDay2;
  }
  if(le.rep==='yearly'){

      </div>

  });

      else if(ltype==='expense') amtBadge=`<span style="font-size:9px;padding:1px 5px;border-radius:8px;background:#FCEBEB;color:#A32D2D;border:1px solid #F7C1C1;font-weight:600;vertical-align:middle;margin-left:3px">💸 ${cu}${s.linkedAmt.toLocaleString()}</span>`;
      else if(ltype==='budget') amtBadge=`<span style="font-size:9px;padding:1px 5px;border-radius:8px;background:#f4f0fe;color:#534AB7;border:1px solid #c4b8f0;font-weight:600;vertical-align:middle;margin-left:3px">📅 ${cu}${s.linkedAmt.toLocaleString()}</span>`;
    }
    const isToday2=date===today();
    const hasBudgetPending=s.linkedAmt>0&&resolveSchedLinkType(s)==='budget'&&isToday2&&!s.confirmedLedId;
    const confirmBtnSide=hasBudgetPending?`<button class="confirm-btn" style="font-size:9px;padding:2px 7px;margin-top:4px" onclick="event.stopPropagation();openConfirmModal('${s.id}')">💳 지출 확정</button>`:'';
    return `<div class="si${isToday?' si-today':''}" style="border-left-color:${col};background:${bg}" onclick="selD('${date}');openSM('${s.id}')">
      <span style="font-size:16px;flex-shrink:0;line-height:1;width:20px;text-align:center;margin-top:1px">`+cej+`</span>
      `+(sij?`<span style="font-size:13px;flex-shrink:0;line-height:1;margin-top:2px">`+sij+`</span>`:'')+`
      <div class="si-body">
        <div class="si-title">${escH(s.title)}${rl?`<span class="rbadge">${rl}</span>`:''}${amtBadge}</div>
        <div class="si-sub">${timeStr?timeStr+' · ':''}${c.name}${s.memo?' · '+escH(s.memo):''}</div>
        ${confirmBtnSide}
      </div>
    </div>`;
  }
  let h=`<div class="side-hd today-hd"><span>✨ 오늘 일정</span></div>`;
  if(!todayScheds.length){
    h+=`<div class="side-empty">오늘 일정이 없어요</div>`;
  } else {
    h+=`<div class="side-list">`;
    todayScheds.forEach(s=>{ h+=schedRow(s,td,true); });
    h+=`</div>`;
  }
  h+=`<div class="side-hd week-hd" style="margin-top:0;border-top:1px solid var(--bd)"><span>📅 다가오는 일정</span><small>7일 이내</small></div>`;
  if(!weekItems.length){
    h+=`<div class="side-empty">다가오는 일정이 없어요<br><span style="font-size:18px;display:block;margin-top:6px">🌸</span></div>`;
  } else {
    h+=`<div class="side-list">`;
    weekItems.forEach(({date,dow,scheds})=>{
      const[,mo,dv]=date.split('-');
      const dowCls=dow===0?'color:#E24B4A':dow===6?'color:var(--blu-d)':'';
      h+=`<div class="si-datelabel" onclick="selD('${date}')" style="cursor:pointer">
        <span style="${dowCls}">${parseInt(mo)}/${parseInt(dv)} (${DL[dow]})</span>
      </div>`;
      scheds.sort((a,b)=>(a.time||'').localeCompare(b.time||'')).forEach(s=>{ h+=schedRow(s,date,false); });
    });
    h+=`</div>`;
  }
  return h;
}
function renderCal(){
  const{y,m,sel,d}=ST;
  const mns=MNS;
  let h=`<div class="cal-nav"><button onclick="nm(-1)">‹</button><span>${y}년 ${mns[m]}</span><button onclick="nm(1)">›</button></div>
  <div class="cal-wrap"><div class="dl"><span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span></div><div class="cb">`;
  const f=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate(),td=today();
  const ss=ST.tab!=='led',sl=ST.tab!=='sch';
  for(let i=0;i<42;i++){
    let dv,m2=m,y2=y,om=false;
    if(i<f){dv=prev-f+i+1;m2=m-1;if(m2<0){m2=11;y2--;}om=true;}
    else if(i-f>=days){dv=i-f-days+1;m2=m+1;if(m2>11){m2=0;y2++;}om=true;}
    else dv=i-f+1;
    const date=ds(y2,m2,dv),itd=date===td,isl=date===sel,dow=i%7;
    let cl='cc'+(om?' om':'')+(itd?' td':'')+(isl?' sl':'')+(dow===0?' su':'')+(dow===6?' sa':'');
    const sc=ss?getScheds(date):[];
    const le=sl?getLedgers(date):[];
    let dots='';
    if(sc.length){
      dots='<div class="dots">';
      sc.slice(0,3).forEach(s=>{
        const c=catBy(s.catId);
        const ej=s.icon||c.emoji||'👤';
        dots+='<div class="ciwrap"><span class="cej">'+ej+'</span><div class="cbar" style="background:'+c.color+'"></div></div>';
      });
      dots+='</div>';
    }
    let amt='';
    if(le.length){
      const inc=le.filter(l=>l.type==='i').reduce((a,l)=>a+l.amount,0);
      const exp=le.filter(l=>l.type==='e').reduce((a,l)=>a+l.amount,0);
      if(inc>0)amt+=`<div class="ca inc">+${inc.toLocaleString()}</div>`;
      if(exp>0){
        const hasInst=le.filter(l=>l.type==='e').some(l=>l.isInstEntry||l.inst);
        amt+=`<div class="ca exp">-${exp.toLocaleString()}${hasInst?'<span style="font-size:7px;background:#f4f0fe;color:#534AB7;border-radius:2px;padding:0 2px;margin-left:1px;vertical-align:middle">할부</span>':''}</div>`;
      }
      const sav=le.filter(l=>l.type==='s').reduce((a,l)=>a+l.amount,0);
      if(sav>0)amt+=`<div class="ca sav">🏦${sav.toLocaleString()}</div>`;
    }
    h+=`<div class="${cl}" onclick="selD('${date}')"><span class="dn">${dv}</span>${dots}${amt}</div>`;
  }
  return h+'</div></div>';
}
function renderSum(){
  if(ST.tab==='sch'||ST.tab==='all') return '';
  const{y,m}=ST;
  const daysInMonth=new Date(y,m+1,0).getDate();
  let inc=0,exp=0,sav=0;
  for(let d=1;d<=daysInMonth;d++){
    const date=ds(y,m,d);
    getLedgers(date).forEach(l=>{
      if(l.type==='i') inc+=l.amount;
      else if(l.type==='e') exp+=l.amount;
      else if(l.type==='s') sav+=l.amount;
    });
  }
  let schedBudgetAmt=0;
  ST.d.s.forEach(sc=>{
    if(!sc.linkedAmt||sc.linkedAmt<=0) return;
    if(sc.confirmedLedId||sc.autoLedId) return;
    const ltype=resolveSchedLinkType(sc);
    if(ltype!=='budget') return;
    const scY=parseInt(sc.date.split('-')[0]);
    const scM=parseInt(sc.date.split('-')[1])-1;
    if(scY===y&&scM===m) schedBudgetAmt+=sc.linkedAmt;
  });
  const cu=getCu();
  const totalExp=exp+schedBudgetAmt;
  return `<div class="scards">
    <div class="sc ic"><div class="lb">총수입</div><div class="vl">${cu}${inc.toLocaleString()}</div></div>
    <div class="sc ex"><div class="lb">총지출${schedBudgetAmt>0?'<span style="font-size:9px;font-weight:400;color:#534AB7;display:block">예정 포함</span>':''}</div><div class="vl">${cu}${totalExp.toLocaleString()}</div></div>
    <div class="sc sv"><div class="lb">총저축</div><div class="vl">${cu}${sav.toLocaleString()}</div></div>
    <div class="sc bl"><div class="lb">잔액</div><div class="vl">${cu}${(inc-totalExp-sav).toLocaleString()}</div></div>
  </div>`;
}
function renderSavPanel(){
  if(ST.tab!=='led') return '';
  const{y,m}=ST;
  const goals=ST.d.sv||[];
  const cu=getCu();

  const curYM=y*12+m; // 0-based month
  const curMonthEnd=`${y}-${String(m+1).padStart(2,'0')}-${String(new Date(y,m+1,0).getDate()).padStart(2,'0')}`;
  const curMonthStart=`${y}-${String(m+1).padStart(2,'0')}-01`;

  // paid: 시작일~현재달까지 누적 합계
  // paidThisMonth: 현재 보는 달만의 저축액
  const paid={}, paidThisMonth={};
  goals.forEach(g=>{paid[g.id]=0; paidThisMonth[g.id]=0;});
  let noGoalSav=0, noGoalThisMonth=0;

  ST.d.e.forEach(l=>{
    if(l.type!=='s') return;
    const baseParts=l.date.split('-').map(Number);
    const baseYM=baseParts[0]*12+(baseParts[1]-1);
    const gid=l.goalId;
    const goalObj=gid?goals.find(g=>g.id===gid):null;
    const gStartStr=goalObj&&goalObj.startDate?goalObj.startDate:l.date;
    const gEndStr=goalObj&&goalObj.endDate
      ?(goalObj.endDate<curMonthEnd?goalObj.endDate:curMonthEnd)
      :curMonthEnd;

    if(l.rep&&l.rep!=='none'){
      let endYM=curYM;
      if(l.repEnd){const ep=l.repEnd.split('-').map(Number);endYM=Math.min(curYM,ep[0]*12+(ep[1]-1));}
      for(let ym=baseYM;ym<=endYM;ym++){
        const ty=Math.floor(ym/12), tm=ym%12;
        const dateStr=`${ty}-${String(tm+1).padStart(2,'0')}-${String(baseParts[2]).padStart(2,'0')}`;
        if(dateStr<gStartStr||dateStr>gEndStr) continue;
        if(matchRepLed(l,dateStr)){
          const amt=l.amount;
          if(gid&&paid[gid]!==undefined){
            paid[gid]+=amt;
            if(ym===curYM) paidThisMonth[gid]+=amt;
          } else if(!gid){
            noGoalSav+=amt;
            if(ym===curYM) noGoalThisMonth+=amt;
          }
        }
      }
    } else {
      if(l.date>=gStartStr&&l.date<=gEndStr&&baseYM<=curYM){
        const amt=l.amount;
        const isThisMonth=(baseParts[0]===y&&baseParts[1]-1===m);
        if(gid&&paid[gid]!==undefined){
          paid[gid]+=amt;
          if(isThisMonth) paidThisMonth[gid]+=amt;
        } else if(!gid){
          noGoalSav+=amt;
          if(isThisMonth) noGoalThisMonth+=amt;
        }
      }
    }
  });

  let h=`<div class="savpanel">
    <div class="savpanel-hd"><span>🏦 저축 목표</span><button onclick="openSavGoalModal()">목표 설정</button></div>
    <div class="savpanel-body">`;
  if(!goals.length){
    h+=`<div class="no-sav-goal">저축 목표가 없어요<br>목표를 설정하면 달성률을 볼 수 있어요 🏦</div>`;
  } else {
    goals.forEach(g=>{
      const cumAmt=paid[g.id]||0;       // 누적 총계
      const thisAmt=paidThisMonth[g.id]||0; // 해당월
      const mGoal=g.monthly||0;         // 월 납입 목표
      const tGoal=g.totalGoal||0;       // 총 목표 금액

      // ── 프로그레스: 총목표 있으면 총목표 기준, 없으면 월납입 기준 ──
      const hasProgress=tGoal>0||mGoal>0;
      const progBase=tGoal>0?tGoal:mGoal;  // 기준값
      const progVal=tGoal>0?cumAmt:thisAmt; // 비교값
      const pct=hasProgress?Math.min(Math.round(progVal/progBase*100),100):0;
      const over=hasProgress&&progVal>=progBase;
      const fillCls=pct<50?'ok':pct<100?'warn':'over';

      // 날짜 범위 라벨
      const drParts=[];
      if(g.startDate) drParts.push(g.startDate+' 시작');
      if(g.endDate) drParts.push(g.endDate+' 목표일');
      const drLabel=drParts.length?`<div style="font-size:10px;color:var(--tx2);margin-top:1px">${drParts.join(' · ')}</div>`:'';

      h+=`<div class="sav-goal-row">
        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px">
          <div class="sav-goal-dot" style="background:${g.color||'#1A82C4'};margin-top:3px"></div>
          <div style="flex:1;min-width:0">
            <div class="sav-goal-name">${escH(g.name)}</div>
            ${drLabel}
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr${tGoal>0?' 1fr':''};gap:6px;margin-bottom:8px">
          <div style="background:var(--bg2);border-radius:8px;padding:7px 9px">
            <div style="font-size:9px;color:var(--tx2);margin-bottom:2px">누적 저축</div>
            <div style="font-size:13px;font-weight:600;color:var(--tx)">${cu}${cumAmt.toLocaleString()}</div>
          </div>
          <div style="background:var(--bg2);border-radius:8px;padding:7px 9px">
            <div style="font-size:9px;color:var(--tx2);margin-bottom:2px">${String(m+1)}월 저축</div>
            <div style="font-size:13px;font-weight:600;color:${mGoal>0&&thisAmt>=mGoal?'#34C759':'var(--tx)'}">${cu}${thisAmt.toLocaleString()}${mGoal>0?'<span style="font-size:9px;color:var(--tx2);font-weight:400"> / '+cu+mGoal.toLocaleString()+'</span>':''}</div>
          </div>
          ${tGoal>0?`<div style="background:var(--bg2);border-radius:8px;padding:7px 9px">
            <div style="font-size:9px;color:var(--tx2);margin-bottom:2px">총 목표</div>
            <div style="font-size:13px;font-weight:600;color:var(--pink)">${cu}${tGoal.toLocaleString()}</div>
          </div>`:''}
        </div>`;

      if(hasProgress){
        const remain=Math.max(0,progBase-progVal);
        const progLabel=tGoal>0?`누적 ${cu}${cumAmt.toLocaleString()} / 목표 ${cu}${tGoal.toLocaleString()}`
          :`이번달 ${cu}${thisAmt.toLocaleString()} / 월목표 ${cu}${mGoal.toLocaleString()}`;
        h+=`<div class="prog-bar" style="margin-bottom:5px"><div class="prog-fill ${fillCls}" style="width:${pct}%"></div></div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <small class="perf-note">${pct}% 달성${over?' ✅':''}</small>
          <small class="perf-note">${over?'🎉 목표 달성!':(remain>0?'남은 금액 '+cu+remain.toLocaleString():'')}</small>
        </div>`;
      }
      h+=`</div>`;
    });
  }
  if(noGoalSav>0){
    h+=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center">
      <span class="perf-note">목표 미지정 저축</span>
      <span class="perf-note"><b>${cu}${noGoalSav.toLocaleString()}</b> (이번달 ${cu}${noGoalThisMonth.toLocaleString()})</span>
    </div>`;
  }
  h+=`</div></div>`;
  return h;
}

function saveSavGoal(id){
  const name=document.getElementById('sg-name').value.trim();
  if(!name) return alert('목표 이름을 입력해주세요');
  const monthly=parseFloat(document.getElementById('sg-monthly').value)||0;
  const totalGoal=parseFloat(document.getElementById('sg-total').value)||0;
  const color=document.getElementById('sg-color').value;
  const startDate=document.getElementById('sg-start').value||'';
  const endDate=document.getElementById('sg-end').value||'';
  if(endDate&&startDate&&endDate<startDate) return alert('목표일이 시작일보다 빠를 수 없어요');
  if(totalGoal>0&&monthly>0&&totalGoal<monthly) return alert('총 목표 금액이 월 납입액보다 작을 수 없어요');
  const goals=ST.d.sv||[];
  if(id){const g=goals.find(x=>x.id===id);if(g){g.name=name;g.monthly=monthly;g.totalGoal=totalGoal;g.color=color;g.startDate=startDate;g.endDate=endDate;}ST.d.sv=goals;}
  else{goals.push({id:'sv'+Date.now(),name,monthly,totalGoal,color,startDate,endDate});ST.d.sv=goals;}
  sd(ST.d);cm();render();
}
function delSavGoal(id){
  if(!confirm('목표를 삭제할까요? 연결된 저축 내역의 목표 연결은 해제됩니다.')) return;
  ST.d.sv=(ST.d.sv||[]).filter(g=>g.id!==id);
  ST.d.e.forEach(l=>{if(l.goalId===id) delete l.goalId;});
  sd(ST.d);cm();render();
}
function renderBudget(){
  if(ST.tab!=='led') return '';
  const{y,m}=ST;
  const b=ST.d.b;
  if(!b) return '';
  const ECATS=getExpCats();
  const cu=getCu();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const spentReal={};
  let totalSpentReal=0;
  ECATS.forEach(c=>spentReal[c.v]=0);
  for(let d=1;d<=daysInMonth;d++){
    getLedgers(ds(y,m,d)).forEach(l=>{
      if(l.type==='e'){
        totalSpentReal+=l.amount;
        if(spentReal[l.cat]!==undefined) spentReal[l.cat]+=l.amount;
        else spentReal[l.cat]=(spentReal[l.cat]||0)+l.amount;
      }
    });
  }
  const spentSched={};
  let budgetSchedTotal=0;
  const budgetSchedItems=[];
  ECATS.forEach(c=>spentSched[c.v]=0);
  ST.d.s.forEach(sc=>{
    if(!sc.linkedAmt||sc.linkedAmt<=0) return;
    if(sc.confirmedLedId||sc.autoLedId) return;
    const ltype=resolveSchedLinkType(sc);
    if(ltype!=='budget') return;
    const scY=parseInt(sc.date.split('-')[0]);
    const scM=parseInt(sc.date.split('-')[1])-1;
    if(scY!==y||scM!==m) return;
    budgetSchedTotal+=sc.linkedAmt;
    const cat=sc.linkedCat||(ECATS[0]?ECATS[0].v:'기타');
    if(spentSched[cat]!==undefined) spentSched[cat]+=sc.linkedAmt;
    else spentSched[cat]=(spentSched[cat]||0)+sc.linkedAmt;
    budgetSchedItems.push({title:sc.title,amt:sc.linkedAmt,cat,date:sc.date,id:sc.id});
  });
  const spentTotal={};
  ECATS.forEach(c=>spentTotal[c.v]=(spentReal[c.v]||0)+(spentSched[c.v]||0));
  const totalSpent=totalSpentReal+budgetSchedTotal;
  const totalBudget=b.total||0;
  const hasTotalBudget=totalBudget>0;
  const hasCatBudget=ECATS.some(c=>(b.cats||{})[c.v]>0);
  if(!hasTotalBudget&&!hasCatBudget){
    return `<div class="bpanel">
      <div class="bpanel-hd"><span>💰 예산</span><button onclick="openBudgetModal()">설정하기</button></div>
      <div class="bpanel-body"><div class="no-budget">예산이 설정되지 않았어요<br>설정 버튼을 눌러 이번 달 예산을 입력해 보세요 🌸</div></div>
    </div>`;
  }
  const mns=MNS;
  let h=`<div class="bpanel">
    <div class="bpanel-hd"><span>💰 ${y}년 ${mns[m]} 예산</span><button onclick="openBudgetModal()">수정</button></div>
    <div class="bpanel-body">`;
  if(hasTotalBudget){
    const pct=Math.min(Math.round(totalSpent/totalBudget*100),100);
    const over=totalSpent>totalBudget;
    const overAmt=totalSpent-totalBudget;
    const fillCls=pct<70?'ok':pct<100?'warn':'over';
    const remain=totalBudget-totalSpent;
    h+=`<div class="budget-total">
      <div class="bt-info">총예산<br><span style="font-size:13px;font-weight:600;color:var(--pur-t)">${cu}${totalBudget.toLocaleString()}</span></div>
      <div class="bt-vals">
        <div class="bt-main" style="color:${over?'#E24B4A':'var(--tx)'}">
          ${cu}${totalSpentReal.toLocaleString()} 지출
          ${budgetSchedTotal>0?`<span style="font-size:11px;font-weight:500;color:#534AB7;margin-left:4px">+ 예정 ${cu}${budgetSchedTotal.toLocaleString()}</span>`:''}
        </div>
        <div class="bt-sub">${over?'<span style="color:#E24B4A">'+cu+overAmt.toLocaleString()+' 초과</span>':'남은 예산 '+cu+remain.toLocaleString()}</div>
      </div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar">
        <div class="prog-fill ${fillCls}" style="width:${Math.min(Math.round(totalSpentReal/totalBudget*100),100)}%;display:inline-block;vertical-align:top"></div>`;
    const realPct=Math.min(Math.round(totalSpentReal/totalBudget*100),100);
    const schedPct=Math.min(Math.round(budgetSchedTotal/totalBudget*100),100-(realPct));
    h+=`</div>
      <div class="prog-bar" style="margin-top:3px;display:flex;gap:0;overflow:hidden;border-radius:4px">
        <div style="height:7px;background:${realPct===0?'transparent':(fillCls==='ok'?'var(--grn-d)':fillCls==='warn'?'#EF9F27':'#E24B4A')};width:${realPct}%;border-radius:${schedPct>0?'4px 0 0 4px':'4px'};transition:width .4s"></div>
        <div style="height:7px;background:${budgetSchedTotal>0?'#c4b8f0':'transparent'};width:${schedPct}%;border-radius:${realPct>0?'0 4px 4px 0':'4px'};transition:width .4s"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">
        <small style="font-size:10px;color:var(--tx2)">${pct}% 사용 (실지출 ${realPct}%${budgetSchedTotal>0?' + 예정 '+schedPct+'%':''})</small>
        <small style="font-size:10px;color:var(--tx2)">${new Date(y,m+1,0).getDate()}일 기준</small>
      </div>
    </div>`;
    if(budgetSchedItems.length>0){
      h+=`<div style="margin-top:8px;padding:8px 10px;background:#f4f0fe;border-radius:8px;border:1px solid #c4b8f0">
        <div style="font-size:11px;font-weight:600;color:#534AB7;margin-bottom:6px">📅 예산지출 예정 (${budgetSchedItems.length}건 · ${cu}${budgetSchedTotal.toLocaleString()})</div>`;
      budgetSchedItems.forEach(item=>{
        const [,mo,dv]=item.date.split('-');
        h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid #ddd8fc;font-size:12px" onclick="selD('${item.date}');stab('sch')">
          <span style="color:var(--tx);cursor:pointer">📌 ${escH(item.title)}</span>
          <span style="color:#534AB7;font-weight:600;flex-shrink:0;margin-left:8px">${parseInt(mo)}/${parseInt(dv)} · -${cu}${item.amt.toLocaleString()}</span>
        </div>`;
      });
      h+=`</div>`;
    }
    if(hasCatBudget) h+=`<div style="border-top:1px solid var(--bd);margin:10px 0"></div>`;
  }
  if(hasCatBudget){
    ECATS.forEach(catObj=>{
      const cat=catObj.v,catIcon=catObj.icon||'';
      const budget=(b.cats||{})[cat]||0;
      if(!budget) return;
      const sReal=spentReal[cat]||0;
      const sSched=spentSched[cat]||0;
      const s=sReal+sSched;
      const pct=Math.min(Math.round(s/budget*100),100);
      const realPctC=Math.min(Math.round(sReal/budget*100),100);
      const schedPctC=Math.min(Math.round(sSched/budget*100),100-realPctC);
      const over=s>budget;
      const fillCls=pct<70?'ok':pct<100?'warn':'over';
      h+=`<div class="prog-wrap">
        <div class="prog-label">
          <span>${catIcon} ${cat}${sSched>0?`<span style="font-size:9px;color:#534AB7;margin-left:3px">(예정 +${cu}${sSched.toLocaleString()})</span>`:''}</span>
          <small>${cu}${s.toLocaleString()} / ${cu}${budget.toLocaleString()}</small>
        </div>
        <div class="prog-bar" style="display:flex;overflow:hidden;border-radius:4px">
          <div style="height:7px;background:${sReal>0?(fillCls==='ok'?'var(--grn-d)':fillCls==='warn'?'#EF9F27':'#E24B4A'):'transparent'};width:${realPctC}%;border-radius:${schedPctC>0?'4px 0 0 4px':'4px'};transition:width .4s"></div>
          <div style="height:7px;background:${sSched>0?'#c4b8f0':'transparent'};width:${schedPctC}%;border-radius:${realPctC>0?'0 4px 4px 0':'4px'};transition:width .4s"></div>
        </div>
        ${over?`<div class="prog-over">▲ ${cu}${(s-budget).toLocaleString()} 초과</div>`:''}
      </div>`;
    });
  }
  h+=`</div></div>`;
  return h;
}
function openBudgetModal(){
  const b=ST.d.b;
  const ECATS=getExpCats();
  const cu=getCuLabel();
  function buildBudgetCatInputs(cats){
    return cats.map(catObj=>`
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
        <span style="font-size:16px;width:24px;text-align:center">${catObj.icon||'📁'}</span>
        <label style="margin:0;flex:0 0 52px;font-size:13px;color:var(--tx)">${escH(catObj.v)}</label>
        <input type="number" id="bcat-${encodeURIComponent(catObj.v)}" value="${(b.cats||{})[catObj.v]||''}" placeholder="0" min="0" inputmode="numeric" style="flex:1">
      </div>`).join('');
  }
  setModal(`<div class="mt">💰 예산 설정<button onclick="cm()">×</button></div>
    <label>월 총예산 (${cu})</label>
    <input type="number" id="btotal" value="${b.total||''}" placeholder="예: 1500000" min="0" inputmode="numeric">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;margin-bottom:2px">
      <label style="margin:0;font-size:12px;color:var(--tx2)">카테고리별 예산 (${cu})</label>
      <button type="button" id="bcat-edit-btn" class="cat-edit-btn" style="font-size:11px;padding:4px 10px" onclick="toggleBudgetCatMgr()">✏️ 카테고리 편집</button>
    </div>
    <div id="bcat-cat-mgr" class="cat-mgr">${renderCatMgr('e',ECATS)}</div>
    <div id="bcat-inputs">${buildBudgetCatInputs(ECATS)}</div>
    <button class="bprim" onclick="saveBudget()">저장</button>
    <button class="bsec" onclick="cm()">취소</button>`);
}
function toggleBudgetCatMgr(){
  const mgr=document.getElementById('bcat-cat-mgr');
  const btn=document.getElementById('bcat-edit-btn');
  if(!mgr) return;
  const willOpen=!mgr.classList.contains('open');
  mgr.classList.toggle('open',willOpen);
  if(btn) btn.classList.toggle('act',willOpen);
  if(willOpen){
    CAT_EDIT_IDX=-1;
    mgr.innerHTML=renderCatMgr('e',getExpCats());
  }
}
// 예산 모달 내 카테고리 변경 시 입력 목록도 갱신
function _refreshBudgetCatInputs(){
  const bInputs=document.getElementById('bcat-inputs');
  if(bInputs){
    const b=ST.d.b;
    const cats=getExpCats();
    bInputs.innerHTML=cats.map(catObj=>`
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px">
        <span style="font-size:16px;width:24px;text-align:center">${catObj.icon||'📁'}</span>
        <label style="margin:0;flex:0 0 52px;font-size:13px;color:var(--tx)">${escH(catObj.v)}</label>
        <input type="number" id="bcat-${encodeURIComponent(catObj.v)}" value="${(b.cats||{})[catObj.v]||''}" placeholder="0" min="0" inputmode="numeric" style="flex:1">
      </div>`).join('');
  }
  const bMgr=document.getElementById('bcat-cat-mgr');
  if(bMgr&&bMgr.classList.contains('open')){
    bMgr.innerHTML=renderCatMgr('e',getExpCats());
  }
}
function saveBudget(){
  const ECATS=getExpCats();
  const total=parseFloat(document.getElementById('btotal').value)||0;
  const cats={};
  ECATS.forEach(catObj=>{
    const el=document.getElementById('bcat-'+encodeURIComponent(catObj.v));
    cats[catObj.v]=el?parseFloat(el.value)||0:0;
  });
  ST.d.b={total,cats};
  sd(ST.d);cm();render();
}

    if(!sc.length) h+=`<div class="empty">일정이 없어요</div>`;
        sc.forEach(s=>{
      const c=catBy(s.catId),rl=rlabel(s),td2=s.time?tdisplay(s.time)+' · ':'';

          <button class="ra-btn ra-del" onclick="quickDelSch('${s.id}')" title="삭제">🗑️</button>

      </div>`;
    });

  }
  if(sl){

    if(!le.length) h+=`<div class="empty">내역이 없어요</div>`;

      const cardTypeLbl=l.cardType==='lump'?'일시불':l.cardType==='inst'?'할부':l.cardType==='disc'?'제휴할인':'';

function buildTP(t){
  const parts=t?(t.split(':').map(Number)):[];
  const hh=parts.length?parts[0]:null,mm=parts.length?parts[1]:null;
  const ap=hh!=null?(hh<12?'오전':'오후'):'오전';
  const hr=hh!=null?(hh%12||12):null;
  let aOpts=['오전','오후'].map(v=>`<option value="${v}"${ap===v?' selected':''}>${v}</option>`).join('');
  let hOpts='<option value="">시</option>';
  for(let h=1;h<=12;h++) hOpts+=`<option value="${h}"${hr===h?' selected':''}>${h}시</option>`;
  let mOpts='<option value="">분</option>';
  for(let mn=0;mn<60;mn+=10) mOpts+=`<option value="${mn}"${mm===mn?' selected':''}>${String(mn).padStart(2,'0')}분</option>`;
  return `<div class="tpick"><select id="tap">${aOpts}</select><select id="thr">${hOpts}</select><select id="tmn">${mOpts}</select></div>`;
}
function getTV(){
  const ap=document.getElementById('tap').value,h=document.getElementById('thr').value,mn=document.getElementById('tmn').value;
  if(!h||mn==='') return '';
  let hh=parseInt(h);
  if(ap==='오후'&&hh!==12) hh+=12;
  if(ap==='오전'&&hh===12) hh=0;
  return `${String(hh).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
}

function addNewIcon(){

  const cp=ej.codePointAt(0);
  if(cp<128) return alert('이모지를 입력해주세요 😊\n(일반 텍스트는 등록할 수 없어요)');
  const icons=getIcons();

  icons.push({v:ej,l:lb});
  saveIcons(icons);
  SI=ej;
  const f=document.getElementById('icon-add-form');
  const cell=document.getElementById('icon-add-cell');
  if(f) f.classList.remove('open');
  if(cell){
    cell.classList.remove('open');

    const lbl=cell.querySelector('.ic-lb');
    if(plus) plus.textContent='＋';

function saveCatEdit(idx,tp){
  const iconEl=document.getElementById('cat-ei-icon');
  const nameEl=document.getElementById('cat-ei-name');
  if(!nameEl) return;
  const name=nameEl.value.trim();
  if(!name) return alert('카테고리 이름을 입력해주세요');
  const icon=(iconEl?[...iconEl.value.trim()][0]||'':'') || '📁';
  const cats=getLedCats(tp);
  if(!cats[idx]) return;
  if(cats.some((c,i)=>i!==idx&&c.v===name)) return alert('이미 있는 카테고리예요');
  const oldName=cats[idx].v;
  cats[idx]={v:name,icon};
  saveLedCats(tp,cats);
  // 가계부 내역의 카테고리명 마이그레이션
  ST.d.e.forEach(l=>{if(l.type===tp&&l.cat===oldName)l.cat=name;});
  // 예산 카테고리 키도 마이그레이션 (지출 카테고리인 경우)
  if(tp==='e'&&ST.d.b&&ST.d.b.cats){
    const oldVal=ST.d.b.cats[oldName];
    if(oldVal!==undefined){
      ST.d.b.cats[name]=oldVal;
      delete ST.d.b.cats[oldName];
    }
  }
  sd(ST.d);
  CAT_EDIT_IDX=-1;

function deleteCat(idx,tp){
  const cats=getLedCats(tp);

  if(cats.length<=1) return alert('카테고리는 최소 1개 이상 있어야 해요');

  cats.splice(idx,1);
  saveLedCats(tp,cats);
  // 예산 카테고리 키도 제거 (지출 카테고리인 경우)
  if(tp==='e'&&ST.d.b&&ST.d.b.cats){

function addCat(tp){
  const iconEl=document.getElementById('cat-new-icon');

  const name=nameEl.value.trim();
  if(!name) return alert('카테고리 이름을 입력해주세요');
  const icon=(iconEl?[...iconEl.value.trim()][0]||'':'') || '📁';
  const cats=getLedCats(tp);

function getBudgetLiveInfo(newAmt,excludeSchId){
  const b=ST.d.b;
  const totalBudget=b?b.total||0:0;
  if(!totalBudget) return {totalBudget:0,spent:0,remain:0};
  const y=ST.y, m=ST.m;
  const daysInMonth=new Date(y,m+1,0).getDate();
  let spent=0;
  for(let d=1;d<=daysInMonth;d++){
    getLedgers(ds(y,m,d)).forEach(l=>{if(l.type==='e') spent+=l.amount;});
  }
  ST.d.s.forEach(sc=>{
    if(sc.id===excludeSchId) return;
    if(!sc.linkedAmt||sc.linkedAmt<=0) return;
    if(sc.confirmedLedId) return;
    if(sc.autoLedId) return;
    const ltype=resolveSchedLinkType(sc);
    if(ltype==='budget'){
      const scY=parseInt(sc.date.split('-')[0]),scM=parseInt(sc.date.split('-')[1])-1;
      if(scY===y&&scM===m) spent+=sc.linkedAmt;
    }
  });
  return {totalBudget,spent,remain:totalBudget-spent-newAmt};
}
function resolveSchedLinkType(sc){
  if(!sc.linkedAmt||sc.linkedAmt<=0) return 'none';
  if(sc.confirmedLedId) return 'confirmed';
  const lt=sc.linkedType||'auto';
  if(lt==='auto') return sc.date>today()?'budget':'expense';
  return lt;
}

function saveLed(id){

  const rleEl=document.getElementById('rle');

  const cardEl=document.getElementById('lcard');

  const tp=document.getElementById('lt').value;
  const isCard=tp==='e'&&payEl&&payEl.value==='card';

  const instN=cardType==='inst'?(parseInt(document.getElementById('inst-n')&&document.getElementById('inst-n').value)||1):1;

    id:id||'e'+Date.now(),
    date:document.getElementById('ld').value,
    type:tp,
    amount:instObj?Math.round(amt/instN):(tp==='e'?amt-discAmt:amt),

    cardId:isCard?(cardEl?cardEl.value:''):'',

  sd(ST.d);cm();render();

// CSV 내보내기
function csvEsc(v){
  if(v===null||v===undefined) return '';
  const s=String(v);
  if(s.includes(',')||s.includes('"')||s.includes('\n'))
    return '"'+s.replace(/"/g,'""')+'"';
  return s;
}
function downloadCSV(rows,filename){
  const bom='\uFEFF';
  const csv=bom+rows.map(r=>r.map(csvEsc).join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function exportCSV(mode){
  const d=ST.d;
  const today_str=new Date().toISOString().slice(0,10);
  if(mode==='led'||mode==='all'){
    const ledHeader=['ID','날짜','유형','카테고리','금액','메모','결제수단','카드명','카드방식','할부개월','할인금액','반복','반복종료일','출처일정ID'];
    const cards=d.cards||[];
    const cardMap={};
    cards.forEach(c=>{cardMap[c.id]=c.name+(c.tail?'('+c.tail+')':'');});
    const ledRows=[ledHeader];
    d.e.forEach(l=>{
      const typeLbl=l.type==='i'?'수입':l.type==='s'?'저축':'지출';
      const cardName=l.cardId?cardMap[l.cardId]||l.cardId:'';
      const cardType=l.cardType==='lump'?'일시불':l.cardType==='inst'?'할부':l.cardType==='disc'?'제휴할인':'';
      const instMonths=l.inst?l.inst.months:'';
      ledRows.push([
        l.id, l.date, typeLbl, l.cat||'', l.inst?l.inst.totalAmt:l.amount,
        l.memo||'', l.pay||'', cardName, cardType,
        instMonths, l.discAmt||0, l.rep||'none', l.repEnd||'', l.fromSchedId||''
      ]);
    });
    if(mode==='led'){
      downloadCSV(ledRows,'포켓플래너_가계부_'+today_str+'.csv');
      return;
    }
  }
  if(mode==='sch'||mode==='all'){
    const schHeader=['ID','날짜','제목','시간','카테고리','메모','반복','반복종료일','연동금액','연동구분','연동카테고리'];
    const catMap={};
    [{id:'me',name:d.c.name||'나'},...(d.c.kids||[])].forEach(c=>{catMap[c.id]=c.name;});
    const schRows=[schHeader];
    d.s.forEach(s=>{
      const ltype=s.linkedAmt>0?(s.linkedType||'auto'):'';

// CSV 가져오기
function importCSV(input){
  const file=input.files[0];
  if(!file) return;
  const msg=document.getElementById('csv-import-msg');
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const text=e.target.result.replace(/^\uFEFF/,'');
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2){showImportMsg('⚠️ 데이터가 없습니다.',false);return;}
      const header=parseCSVLine(lines[0]);
      const rows=lines.slice(1).map(parseCSVLine);
      const isLed=header[0]==='ID'&&header[2]==='유형';
      const isSch=header[0]==='ID'&&header[2]==='제목';
      if(!isLed&&!isSch){showImportMsg('❌ 포켓플래너 형식의 CSV가 아닙니다.',false);return;}
      let added=0,skipped=0;
      const d=ST.d;
      if(isLed){
        const existIds=new Set(d.e.map(l=>l.id));
        rows.forEach(r=>{
          if(r.length<5) return;
          const id=r[0]||('e'+Date.now()+Math.random());
          if(existIds.has(id)){skipped++;return;}
          const typeLbl=r[2];
          const type=typeLbl==='수입'?'i':typeLbl==='저축'?'s':'e';
          const amt=parseFloat(r[4])||0;
          const instN=parseInt(r[9])||0;
          const instObj=instN>1?{months:instN,totalAmt:amt}:null;
          const payRaw=r[6]||'';
          const pay=payRaw==='cash'||payRaw==='현금'?'cash':'card';
          const cardTypeRaw=r[8]||'';
          const cardType=cardTypeRaw==='할부'?'inst':cardTypeRaw==='제휴할인'?'disc':'lump';
          d.e.push({
            id,date:r[1]||today(),type,cat:r[3]||'기타',
            amount:instObj?Math.round(amt/instN):amt,
            memo:r[5]||'',pay,cardId:'',cardType,
            discAmt:parseFloat(r[10])||0,goalId:'',
            rep:r[11]||'none',repEnd:r[12]||'',
            inst:instObj,fromSchedId:r[13]||''
          });
          existIds.add(id);added++;
        });
        sd(d);showImportMsg(`✅ 가계부: ${added}건 추가, ${skipped}건 중복 건너뜀`,true);
      }
      if(isSch){
        const existIds=new Set(d.s.map(s=>s.id));
        const nameToId={};
        [{id:'me',name:d.c.name||'나'},...(d.c.kids||[])].forEach(c=>{nameToId[c.name]=c.id;});
        rows.forEach(r=>{
          if(r.length<3) return;
          const id=r[0]||('s'+Date.now()+Math.random());
          if(existIds.has(id)){skipped++;return;}
          const catName=r[4]||'';
          const catId=nameToId[catName]||'me';
          d.s.push({
            id,date:r[1]||today(),title:r[2]||'',time:r[3]||'',
            catId,memo:r[5]||'',icon:'',
            rep:r[6]||'none',repEnd:r[7]||'',
            linkedAmt:parseFloat(r[8])||0,
            linkedType:r[9]||'auto',linkedCat:r[10]||'',
            confirmedLedId:'',autoLedId:''
          });
          existIds.add(id);added++;
        });
        sd(d);showImportMsg(`✅ 일정: ${added}건 추가, ${skipped}건 중복 건너뜀`,true);
      }
    }catch(err){
      showImportMsg('❌ 오류: '+err.message,false);
    }
    input.value='';
  };
  reader.readAsText(file,'UTF-8');
}
function parseCSVLine(line){
  const result=[];
  let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQ){
      if(ch==='"'&&line[i+1]==='"'){cur+='"';i++;}
      else if(ch==='"') inQ=false;
      else cur+=ch;
    } else {
      if(ch==='"') inQ=true;
      else if(ch===','){result.push(cur);cur='';}
      else cur+=ch;
    }
  }
  result.push(cur);
  return result;
}
function showImportMsg(msg,ok){
  render();
  const el=document.getElementById('csv-import-msg');
  if(!el) return;
  el.style.display='block';
  el.style.color=ok?'var(--grn-t)':'#A32D2D';
  el.style.background=ok?'var(--grn)':'#FCEBEB';
  el.style.padding='6px 10px';
  el.style.borderRadius='6px';
  el.style.fontWeight='600';
  el.textContent=msg;
  setTimeout(()=>{const e2=document.getElementById('csv-import-msg');if(e2)e2.style.display='none';},5000);
}
